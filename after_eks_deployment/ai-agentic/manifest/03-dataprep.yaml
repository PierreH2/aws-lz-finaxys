# =============================================================================
# Dataprep — Deployment + ClusterIP Service (internal only)
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dataprep
  namespace: ai-agentic
  labels:
    app: dataprep
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dataprep
  template:
    metadata:
      labels:
        app: dataprep
    spec:
      containers:
        - name: dataprep
          image: 333320350721.dkr.ecr.eu-west-1.amazonaws.com/agentic-research:dataprep-latest
          command: ["poetry", "run"]
          args: ["dataprep_server", "--config", "configs/config-default.yaml"]
          ports:
            - containerPort: 8001
          envFrom:
            - secretRef:
                name: agentic-research-secrets
          env:
            - name: CHROMA_OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: agentic-research-secrets
                  key: OPENAI_API_KEY
            - name: LITELLM_LOG
              value: "ERROR"
            - name: APP_VERSION
              value: "dev"
          volumeMounts:
            - name: app-data
              mountPath: /app/data
              subPath: data
            - name: app-data
              mountPath: /app/output
              subPath: output
            - name: app-data
              mountPath: /app/logs
              subPath: logs
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
      volumes:
        - name: app-data
          persistentVolumeClaim:
            claimName: app-data-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: dataprep
  namespace: ai-agentic
  labels:
    app: dataprep
spec:
  type: ClusterIP
  selector:
    app: dataprep
  ports:
    - port: 8001
      targetPort: 8001
      protocol: TCP
---
# =============================================================================
# Ingress — Expose dataprep on port 8001
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dataprep
  namespace: ai-agentic
  labels:
    app: dataprep
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: instance
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dataprep
                port:
                  number: 8001
