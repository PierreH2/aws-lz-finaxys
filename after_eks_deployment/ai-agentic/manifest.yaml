# =============================================================================
# EFS Persistent Volumes (shared filesystem — replace fs-REPLACE_ME with your EFS ID)
# =============================================================================
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: ai-agentic-test-files-pv
spec:
  capacity:
    storage: 5Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: efs-sc
  csi:
    driver: efs.csi.aws.com
    volumeHandle: fs-REPLACE_ME::fsap-test-files
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: ai-agentic-chromadb-pv
spec:
  capacity:
    storage: 10Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: efs-sc
  csi:
    driver: efs.csi.aws.com
    volumeHandle: fs-REPLACE_ME::fsap-chromadb
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: ai-agentic-models-pv
spec:
  capacity:
    storage: 20Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: efs-sc
  csi:
    driver: efs.csi.aws.com
    volumeHandle: fs-REPLACE_ME::fsap-models

# =============================================================================
# Persistent Volume Claims
# =============================================================================
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: test-files-pvc
  namespace: ai-agentic
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: efs-sc
  resources:
    requests:
      storage: 5Gi
  volumeName: ai-agentic-test-files-pv
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: chromadb-data-pvc
  namespace: ai-agentic
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: efs-sc
  resources:
    requests:
      storage: 10Gi
  volumeName: ai-agentic-chromadb-pv
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: models-pvc
  namespace: ai-agentic
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: efs-sc
  resources:
    requests:
      storage: 20Gi
  volumeName: ai-agentic-models-pv

# =============================================================================
# Ingress — expose dataprep SSE API via ALB
# =============================================================================
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-agentic-ingress
  namespace: ai-agentic
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80}]'
    alb.ingress.kubernetes.io/healthcheck-path: /health
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dataprep
                port:
                  number: 8001
