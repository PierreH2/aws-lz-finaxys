
# =============================================================================
# LLaMA.cpp (CPU inference) #to remove ?
# =============================================================================
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llama-cpp-cpu
  namespace: ai-agentic
  labels:
    app: llama-cpp-cpu
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llama-cpp-cpu
  template:
    metadata:
      labels:
        app: llama-cpp-cpu
    spec:
      containers:
        - name: llama-cpp
          # TODO: Push your local/llama.cpp:server image to ECR and update this
          image: 333320350721.dkr.ecr.eu-west-1.amazonaws.com/llama-cpp:server
          ports:
            - containerPort: 8002
          args:
            - "-m"
            - "/models/hub/models--bartowski--Qwen2.5-3B-Instruct-GGUF/snapshots/f302c64a2269a69fb27b2f9473b362f5bb8e78d8/Qwen2.5-3B-Instruct-Q4_K_M.gguf"
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "8002"
            - "--ctx-size"
            - "4096"
            - "--n-predict"
            - "-1"
            - "-b"
            - "512"
            - "-ub"
            - "512"
          volumeMounts:
            - name: models
              mountPath: /models
          resources:
            requests:
              cpu: "2"
              memory: 4Gi
            limits:
              cpu: "4"
              memory: 8Gi
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: models-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: llama-cpp-cpu
  namespace: ai-agentic
  labels:
    app: llama-cpp-cpu
spec:
  type: ClusterIP
  selector:
    app: llama-cpp-cpu
  ports:
    - port: 8002
      targetPort: 8002
      protocol: TCP
