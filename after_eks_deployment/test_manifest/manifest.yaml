apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: ebs-sc
provisioner: ebs.csi.aws.com
volumeBindingMode: WaitForFirstConsumer
reclaimPolicy: Delete
---
apiVersion: v1
kind: Namespace
metadata:
  name: test
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: web-ebs-pvc
  namespace: test
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ebs-sc
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-alb-test
  namespace: test
  labels:
    app: web-alb-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web-alb-test
  template:
    metadata:
      labels:
        app: web-alb-test
    spec:
      initContainers:
        - name: init-content
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              cat <<'EOF' > /data/index.html
              <html><body><h1>EKS Fargate + ALB OK</h1><p>Persistent volume mounted from EFS.</p></body></html>
              EOF
          volumeMounts:
            - name: web-content
              mountPath: /data
      containers:
        - name: web
          image: 333320350721.dkr.ecr.eu-west-1.amazonaws.com/agentic-research:latest
          ports:
            - containerPort: 80
          volumeMounts:
            - name: web-content
              mountPath: /usr/share/nginx/html
      volumes:
        - name: web-content
          persistentVolumeClaim:
            claimName: web-ebs-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: web-alb-test-svc
  namespace: test
  labels:
    app: web-alb-test
spec:
  type: ClusterIP
  selector:
    app: web-alb-test
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: web-alb-test-ingress
  namespace: test
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80}]'
    alb.ingress.kubernetes.io/security-groups: sg-0b21bd7e276c05910
    alb.ingress.kubernetes.io/subnets: subnet-0b005bd45e5ce38d9,subnet-0ac7e733ba4a63961
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web-alb-test-svc
                port:
                  number: 80
