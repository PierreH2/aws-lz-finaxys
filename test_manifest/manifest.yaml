apiVersion: v1
kind: PersistentVolume
metadata:
  name: web-efs-pv
spec:
  capacity:
    storage: 5Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: efs-sc
  csi:
    driver: efs.csi.aws.com
    volumeHandle: fs-0ad7b814ce04d09cb
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: web-efs-pvc
  namespace: default
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: efs-sc
  resources:
    requests:
      storage: 5Gi
  volumeName: web-efs-pv
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-alb-test
  namespace: default
  labels:
    app: web-alb-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web-alb-test
  template:
    metadata:
      labels:
        app: web-alb-test
    spec:
      initContainers:
        - name: init-content
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              cat <<'EOF' > /data/index.html
              <html><body><h1>EKS Fargate + ALB OK</h1><p>Persistent volume mounted from EFS.</p></body></html>
              EOF
          volumeMounts:
            - name: web-content
              mountPath: /data
      containers:
        - name: web
          image: 333320350721.dkr.ecr.eu-west-1.amazonaws.com/agentic-research:fargate-alb-test
          ports:
            - containerPort: 80
          volumeMounts:
            - name: web-content
              mountPath: /usr/share/nginx/html
      volumes:
        - name: web-content
          persistentVolumeClaim:
            claimName: web-efs-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: web-alb-test-svc
  namespace: default
  labels:
    app: web-alb-test
spec:
  type: ClusterIP
  selector:
    app: web-alb-test
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: web-alb-test-ingress
  namespace: default
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80}]'
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web-alb-test-svc
                port:
                  number: 80
